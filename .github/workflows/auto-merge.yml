name: Auto Approve and Merge

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

jobs:
  auto-approve:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
    steps:
      - name: Auto approve (hwangkyuseok PR → cnrkddl token)
        if: github.event.pull_request.user.login == 'hwangkyuseok'
        env:
          GH_TOKEN: ${{ secrets.PAT_CNRKDDL }}
        run: |
          gh pr review ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --approve \
            --body "Auto-approved by cnrkddl token"

      - name: Auto approve (cnrkddl PR → hwangkyuseok token)
        if: github.event.pull_request.user.login == 'cnrkddl'
        env:
          GH_TOKEN: ${{ secrets.PAT_HWANGKYUSEOK }}
        run: |
          gh pr review ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --approve \
            --body "Auto-approved by hwangkyuseok token"

      - name: Merge after approval
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --squash \
            --auto \
            --delete-branch
