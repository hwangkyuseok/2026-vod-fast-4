# docker-compose.pipeline.yml
# ─────────────────────────────────────────────────────────────────────────────
# VOD 광고 오버레이 파이프라인 — 전체 서비스 구성 (v2.15)
#
# 서버 배포 경로:
#   백엔드  : /app/Docker/pipeline/
#   프론트  : /app/Docker/frontend/
#   이 파일 : /app/Docker/pipeline/
#
# 이미지 구조 (서비스별 완전 분리):
#   vod-step1    : step1   (Dockerfile.step1)
#   vod-step2a   : step2-a (Dockerfile.step2a) — 오디오 우선: faster-whisper + SBERT
#   vod-step2b   : step2-b (Dockerfile.step2b) — 비전 후속: 씬별 YOLO + Gemini
#   vod-step3    : step3   (Dockerfile.step3)
#   vod-step4    : step4   (Dockerfile.step4)
#   vod-step5    : step5-api (Dockerfile.step5)
#   vod-frontend : frontend  (Dockerfile.frontend)
#
# Step2 실행 순서: step2-a → QUEUE_STEP2B → step2-b (순차, gate 없음)
#
# 최초 실행:
#   cp .env.example .env  # .env 파일 생성 후 실제 값 입력
#   docker-compose -f docker-compose.pipeline.yml build
#   docker-compose -f docker-compose.pipeline.yml up -d
#
# 전체 중지:
#   docker-compose -f docker-compose.pipeline.yml down
#
# 로그 확인:
#   docker-compose -f docker-compose.pipeline.yml logs -f step2-a
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Step 1: 전처리 (프레임 추출 / 오디오 디먹싱) ──────────────────────────
  step1:
    build:
      context: /app/Docker/pipeline/backend
      dockerfile: Dockerfile.step1
    image: vod-step1:latest
    restart: unless-stopped
    environment:
      DB_HOST: "${DB_HOST}"
      DB_PORT: "${DB_PORT:-5432}"
      DB_NAME: "${DB_NAME}"
      DB_USER: "${DB_USER}"
      DB_PASSWORD: "${DB_PASSWORD}"
      RABBITMQ_HOST: "${RABBITMQ_HOST}"
      RABBITMQ_PORT: "${RABBITMQ_PORT:-5672}"
      RABBITMQ_USER: "${RABBITMQ_USER}"
      RABBITMQ_PASSWORD: "${RABBITMQ_PASSWORD}"
      QUEUE_PREFIX: "${QUEUE_PREFIX:-prod}"
      STORAGE_BASE: "/app/storage"
      TZ: "${TZ:-Asia/Seoul}"
    volumes:
      - /app/HelloVision/data/vod:/vod:ro
      - /app/HelloVision/data/storage:/app/storage
      - /app/HelloVision/data/logs:/app/storage/logs

  # ── Step 2-A: 오디오 우선 분석 (faster-whisper + SBERT 씬 분절) ──────────
  step2-a:
    build:
      context: /app/Docker/pipeline/backend
      dockerfile: Dockerfile.step2a
    image: vod-step2a:latest
    restart: unless-stopped
    environment:
      DB_HOST: "${DB_HOST}"
      DB_PORT: "${DB_PORT:-5432}"
      DB_NAME: "${DB_NAME}"
      DB_USER: "${DB_USER}"
      DB_PASSWORD: "${DB_PASSWORD}"
      RABBITMQ_HOST: "${RABBITMQ_HOST}"
      RABBITMQ_PORT: "${RABBITMQ_PORT:-5672}"
      RABBITMQ_USER: "${RABBITMQ_USER}"
      RABBITMQ_PASSWORD: "${RABBITMQ_PASSWORD}"
      QUEUE_PREFIX: "${QUEUE_PREFIX:-prod}"
      STORAGE_BASE: "/app/storage"
      FASTER_WHISPER_MODEL: "${FASTER_WHISPER_MODEL:-large-v3}"
      SBERT_MODEL: "${SBERT_MODEL:-jhgan/ko-sroberta-multitask}"
      SBERT_SILENCE_GAP_SEC: "${SBERT_SILENCE_GAP_SEC:-4.0}"
      SBERT_SIM_THRESHOLD: "${SBERT_SIM_THRESHOLD:-0.3}"
      TZ: "${TZ:-Asia/Seoul}"
      HF_HOME: "/models"
      TRANSFORMERS_CACHE: "/models"
    volumes:
      - /app/HelloVision/data/storage:/app/storage
      - /app/HelloVision/data/logs:/app/storage/logs
      - step2a_model_cache:/models
    deploy:
      resources:
        limits:
          memory: 6G        # faster-whisper large-v3 (~3GB) + SBERT + Python 오버헤드
        reservations:
          memory: 1G

  # ── Step 2-B: 비전 후속 분석 (씬별 YOLO + Gemini → 상황/감정/욕구) ───────
  step2-b:
    build:
      context: /app/Docker/pipeline/backend
      dockerfile: Dockerfile.step2b
    image: vod-step2b:latest
    restart: unless-stopped
    depends_on:
      - step2-a
    shm_size: '512m'          # PyTorch/YOLO 멀티프로세싱 shared memory
    environment:
      DB_HOST: "${DB_HOST}"
      DB_PORT: "${DB_PORT:-5432}"
      DB_NAME: "${DB_NAME}"
      DB_USER: "${DB_USER}"
      DB_PASSWORD: "${DB_PASSWORD}"
      RABBITMQ_HOST: "${RABBITMQ_HOST}"
      RABBITMQ_PORT: "${RABBITMQ_PORT:-5672}"
      RABBITMQ_USER: "${RABBITMQ_USER}"
      RABBITMQ_PASSWORD: "${RABBITMQ_PASSWORD}"
      QUEUE_PREFIX: "${QUEUE_PREFIX:-prod}"
      STORAGE_BASE: "/app/storage"
      VLM_BACKEND: "${VLM_BACKEND:-gemini}"
      GEMINI_API_KEY: "${GEMINI_API_KEY}"
      GEMINI_MODEL: "${GEMINI_MODEL:-gemini-2.5-flash-preview-04-17}"
      GEMINI_RPM_INTERVAL: "${GEMINI_RPM_INTERVAL:-0.1}"
      SCENE_SAMPLE_FRAMES: "${SCENE_SAMPLE_FRAMES:-3}"
      TZ: "${TZ:-Asia/Seoul}"
      HF_HOME: "/models"
      TRANSFORMERS_CACHE: "/models"
    volumes:
      - /app/HelloVision/data/storage:/app/storage
      - /app/HelloVision/data/logs:/app/storage/logs
      - step2b_model_cache:/models
      - step2b_yolo_cache:/root/.config/Ultralytics  # YOLO 모델 캐시 (재다운로드 방지)
    deploy:
      resources:
        limits:
          memory: 4G        # yolov8l (~1GB) + 프레임 버퍼 + Python 오버헤드
        reservations:
          memory: 1G

  # ── Step 3: 후보 페어 생성 (analysis_scene × ad_inventory) ────────────────
  step3:
    build:
      context: /app/Docker/pipeline/backend
      dockerfile: Dockerfile.step3
    image: vod-step3:latest
    restart: unless-stopped
    depends_on:
      - step1
    environment:
      DB_HOST: "${DB_HOST}"
      DB_PORT: "${DB_PORT:-5432}"
      DB_NAME: "${DB_NAME}"
      DB_USER: "${DB_USER}"
      DB_PASSWORD: "${DB_PASSWORD}"
      RABBITMQ_HOST: "${RABBITMQ_HOST}"
      RABBITMQ_PORT: "${RABBITMQ_PORT:-5672}"
      RABBITMQ_USER: "${RABBITMQ_USER}"
      RABBITMQ_PASSWORD: "${RABBITMQ_PASSWORD}"
      QUEUE_PREFIX: "${QUEUE_PREFIX:-prod}"
      STORAGE_BASE: "/app/storage"
      TZ: "${TZ:-Asia/Seoul}"
    volumes:
      - /app/HelloVision/data/storage:/app/storage
      - /app/HelloVision/data/logs:/app/storage/logs

  # ── Step 4: 스코어링 / 광고 결정 ─────────────────────────────────────────
  step4:
    build:
      context: /app/Docker/pipeline/backend
      dockerfile: Dockerfile.step4
    image: vod-step4:latest
    restart: unless-stopped
    depends_on:
      - step1
    environment:
      DB_HOST: "${DB_HOST}"
      DB_PORT: "${DB_PORT:-5432}"
      DB_NAME: "${DB_NAME}"
      DB_USER: "${DB_USER}"
      DB_PASSWORD: "${DB_PASSWORD}"
      RABBITMQ_HOST: "${RABBITMQ_HOST}"
      RABBITMQ_PORT: "${RABBITMQ_PORT:-5672}"
      RABBITMQ_USER: "${RABBITMQ_USER}"
      RABBITMQ_PASSWORD: "${RABBITMQ_PASSWORD}"
      QUEUE_PREFIX: "${QUEUE_PREFIX:-prod}"
      STORAGE_BASE: "/app/storage"
      TZ: "${TZ:-Asia/Seoul}"
      HF_HOME: "/models"
      TRANSFORMERS_CACHE: "/models"
    volumes:
      - /app/HelloVision/data/storage:/app/storage
      - /app/HelloVision/data/logs:/app/storage/logs
      - step4_model_cache:/models
    deploy:
      resources:
        limits:
          memory: 2G        # SBERT cross-encoder (~400MB) + 스코어링 오버헤드
        reservations:
          memory: 512M

  # ── Step 5: FastAPI 서버 ──────────────────────────────────────────────────
  step5-api:
    build:
      context: /app/Docker/pipeline/backend
      dockerfile: Dockerfile.step5
    image: vod-step5:latest
    restart: unless-stopped
    depends_on:
      - step1
    ports:
      - "8000:8000"
    environment:
      DB_HOST: "${DB_HOST}"
      DB_PORT: "${DB_PORT:-5432}"
      DB_NAME: "${DB_NAME}"
      DB_USER: "${DB_USER}"
      DB_PASSWORD: "${DB_PASSWORD}"
      RABBITMQ_HOST: "${RABBITMQ_HOST}"
      RABBITMQ_PORT: "${RABBITMQ_PORT:-5672}"
      RABBITMQ_USER: "${RABBITMQ_USER}"
      RABBITMQ_PASSWORD: "${RABBITMQ_PASSWORD}"
      QUEUE_PREFIX: "${QUEUE_PREFIX:-prod}"
      STORAGE_BASE: "/app/storage"
      AD_VIDEO_DIR: "/ads/video"
      AD_IMAGE_DIR: "/ads/banner"
      API_HOST: "0.0.0.0"
      API_PORT: "8000"
      API_BASE_URL: "${API_BASE_URL}"
      VOD_DIR: "/vod"
      TZ: "${TZ:-Asia/Seoul}"
    volumes:
      - /app/HelloVision/data/storage:/app/storage
      - /app/HelloVision/data/logs:/app/storage/logs
      - /app/HelloVision/data/ad_assets/video:/ads/video:ro
      - /app/HelloVision/data/ad_assets/image:/ads/banner:ro
      - /app/HelloVision/data/vod:/vod:ro

  # ── Frontend: Next.js ─────────────────────────────────────────────────────
  frontend:
    build:
      context: /app/Docker/pipeline/frontend
      dockerfile: Dockerfile.frontend
      args:
        BACKEND_URL: "http://step5-api:8000"
    image: vod-frontend:latest
    restart: unless-stopped
    depends_on:
      - step5-api
    ports:
      - "3330:3000"
    environment:
      BACKEND_URL: "http://step5-api:8000"
      TZ: "${TZ:-Asia/Seoul}"

# ── Named Volumes ─────────────────────────────────────────────────────────────
volumes:
  step2a_model_cache:
    driver: local
  step2b_model_cache:
    driver: local
  step2b_yolo_cache:           # YOLO 모델 캐시 (~/.config/Ultralytics)
    driver: local
  step4_model_cache:
    driver: local
