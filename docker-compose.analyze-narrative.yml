# docker-compose.analyze-narrative.yml
# ─────────────────────────────────────────────────────────────────────────────
# 광고 narrative 분석(analyze_ad_narrative.py) 전용 컨테이너 (v2.5)
#
# 배포 경로 : /app/Docker/analyze-narrative/
# 로그 경로 : /app/HelloVision/data/logs/
#
# 실행 예시 (서버에서):
#   cd /app/Docker/analyze-narrative
#
#   전체 분석 (미처리 광고만 자동 선택):
#     docker compose run --rm analyze-narrative
#
#   일부만 테스트:
#     docker compose run --rm analyze-narrative --limit 10
#
#   미처리 목록만 출력 (분석 없음):
#     docker compose run --rm analyze-narrative --dry-run
#
#   빌드:
#     docker compose build
# ─────────────────────────────────────────────────────────────────────────────

services:
  analyze-narrative:
    build:
      context: /app/Docker/analyze-narrative
      dockerfile: Dockerfile.analyze-narrative
    image: vod-analyze-narrative:latest

    environment:
      # ── 데이터베이스 ──────────────────────────────────────────────────────
      DB_HOST: "${DB_HOST}"
      DB_PORT: "${DB_PORT:-5432}"
      DB_NAME: "${DB_NAME}"
      DB_USER: "${DB_USER}"
      DB_PASSWORD: "${DB_PASSWORD}"

      # ── 광고 파일 경로 (컨테이너 내부 경로) ──────────────────────────────
      AD_VIDEO_DIR: "/ads/video"
      AD_IMAGE_DIR: "/ads/banner"

      # ── 로그 저장 경로 ────────────────────────────────────────────────────
      STORAGE_BASE: "/app/storage"

      # ── 시간대 ────────────────────────────────────────────────────────────
      TZ: "${TZ:-Asia/Seoul}"

      # ── 모델 캐시 ─────────────────────────────────────────────────────────
      HF_HOME: "/models"
      TRANSFORMERS_CACHE: "/models"

    volumes:
      # ── 광고 미디어 파일 (읽기 전용) ─────────────────────────────────────
      - /app/HelloVision/data/ad_assets/video:/ads/video:ro
      - /app/HelloVision/data/ad_assets/image:/ads/banner:ro

      # ── Qwen2-VL 모델 캐시 (약 4.5GB, 첫 실행 시 자동 다운로드) ─────────
      - qwen_model_cache:/models

      # ── 로그 파일 ─────────────────────────────────────────────────────────
      - /app/HelloVision/data/logs:/app/storage/logs

    restart: "no"

# ── Named Volumes ──────────────────────────────────────────────────────────
volumes:
  qwen_model_cache:
    driver: local
